<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us – RandomWheel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    .contact-container { padding: 140px 0 80px; max-width: 600px; margin: 0 auto; }
    .contact-form { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: var(--text); margin-bottom: 8px; font-weight: 600; }
    .form-group input, .form-group textarea { 
      width: 100%; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); 
      border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); outline: none; }
    .submit-btn { 
      width: 100%; padding: 14px; background: var(--accent); color: white; border: none; 
      border-radius: var(--radius-sm); font-weight: 800; cursor: pointer; transition: 0.3s;
    }
    .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  </style>
</head>
<body>

<div id="header-root"></div>

<main class="container">
  <div class="contact-container">
    <h1 style="font-family: var(--font-display); color: var(--text); margin-bottom: 10px; text-align: center;">Get in Touch</h1>
    <p style="color: var(--text2); text-align: center; margin-bottom: 40px;">Have a feature request or found a bug? Let us know!</p>
    
    <form class="contact-form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea rows="5" placeholder="How can we help?" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>
</main>

<div id="footer-root"></div>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('header-root').innerHTML = Header.render();
    Header.init();
    document.getElementById('footer-root').innerHTML = Footer.render();
    Footer.init();
  });
</script>
</body>
</html>
